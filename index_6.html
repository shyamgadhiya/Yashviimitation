    colors:{
      brand:{

        rose:'#D4939A',

      display:['Playfair Display','Georgia','serif'],
      body:['DM Sans','system-ui','sans-serif'],

<style>
/* ── CSS Variables — Light & Dark ── */
:root {
  --bg:          #FBF8F5;
  --bg-soft:     #F5F0EA;
  --bg-card:     #FFFFFF;
  --bg-mid:      #EDE7DF;
  --border:      #E2D9CE;
  --border-soft: #EDE7DF;
  --text:        #1A1612;
  --text-mid:    #3D3530;
  --text-muted:  #8A7E76;
  --pink:        #C4878C;
  --pink-light:  #E8B4B8;
  --pink-dark:   #9E5F65;
  --header-bg:   rgba(251,248,245,0.94);
  --shadow:      0 4px 24px rgba(100,70,60,0.08);
  --shadow-card: 0 2px 12px rgba(100,70,60,0.06);
  --shimmer-a:   #C4878C;
  --shimmer-b:   #E8B4B8;
  --shimmer-c:   #9E5F65;
}
html.dark {
  --bg:          #0A0A0A;
  --bg-soft:     #151515;
  --bg-card:     #151515;
  --bg-mid:      #1E1E1E;
  --border:      #2A2A2A;
  --border-soft: #222222;
  --text:        #F7F3EF;
  --text-mid:    #C9BFB6;
  --text-muted:  #7A7068;
  --pink:        #E8B4B8;
  --pink-light:  #F5D6D8;
  --pink-dark:   #C4878C;
  --header-bg:   rgba(10,10,10,0.94);
  --shadow:      0 4px 24px rgba(0,0,0,0.3);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.25);
  --shimmer-a:   #E8B4B8;
  --shimmer-b:   #F5D6D8;
  --shimmer-c:   #C4878C;
}

/* ── Base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .25s,color .25s;min-height:100vh}
a{text-decoration:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--pink-light);border-radius:2px}

/* ── Shimmer ── */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.shimmer-text{
  background:linear-gradient(90deg,var(--shimmer-a) 0%,var(--shimmer-b) 40%,var(--shimmer-c) 60%,var(--shimmer-a) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
}

/* ── Theme toggle button ── */
.theme-toggle{
  position:fixed;bottom:24px;right:24px;z-index:500;
  width:48px;height:48px;border-radius:50%;
  background:var(--bg-card);border:1.5px solid var(--border);
  box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;font-size:20px;
}
.theme-toggle:hover{border-color:var(--pink);transform:scale(1.08);}

/* ── Helpers ── */
.c-bg       {background:var(--bg)}
.c-bg-soft  {background:var(--bg-soft)}
.c-bg-card  {background:var(--bg-card)}
.c-bg-mid   {background:var(--bg-mid)}
.c-border   {border-color:var(--border)}
.c-border-s {border-color:var(--border-soft)}
.c-text     {color:var(--text)}
.c-text-mid {color:var(--text-mid)}
.c-muted    {color:var(--text-muted)}
.c-pink     {color:var(--pink)}
.c-pink-l   {color:var(--pink-light)}
.c-shadow   {box-shadow:var(--shadow)}
.c-shadow-c {box-shadow:var(--shadow-card)}

/* ── Transitions ── */
.c-bg,.c-bg-soft,.c-bg-card,.c-bg-mid,
.c-border,.c-text,.c-muted,.c-pink{transition:background .25s,color .25s,border-color .25s}

/* ── Input focus ── */
.fi:focus{outline:none;border-color:var(--pink)!important;box-shadow:0 0 0 2px rgba(196,135,140,.18)}

/* ── Card hover ── */
.card-h:hover{box-shadow:0 8px 32px rgba(196,135,140,.16);border-color:var(--pink)!important}
html.dark .card-h:hover{box-shadow:0 0 40px rgba(232,180,184,.12)}

/* ── No scrollbar ── */
.noscroll::-webkit-scrollbar{display:none}
.noscroll{-ms-overflow-style:none;scrollbar-width:none}

/* ── Modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem}
html.dark .modal-ov{background:rgba(0,0,0,.72)}
.modal-box{background:var(--bg-card);border:1px solid var(--border);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;position:relative}

/* ── Stagger ── */
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.16s}
.stagger>*:nth-child(5){animation-delay:.20s}
.stagger>*:nth-child(6){animation-delay:.24s}
.stagger>*:nth-child(7){animation-delay:.28s}
.stagger>*:nth-child(8){animation-delay:.32s}

/* ── Hero gradient ── */
.hero-light{background:linear-gradient(135deg,#FBF8F5 0%,#F0E8E0 40%,#EDE0D4 100%)}
html.dark .hero-light{background:linear-gradient(135deg,#0A0A0A 0%,#151515 50%,#1E1E1E 100%)}

/* ── Tab underline ── */
.tab-a{color:var(--pink);border-bottom:2px solid var(--pink)}
.tab-i{color:var(--text-muted);border-bottom:2px solid transparent}
.tab-i:hover{color:var(--text-mid)}

/* ── Badge ── */
.badge-new{background:var(--pink);color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px}
.badge-feat{background:var(--bg-card);color:var(--pink);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--pink)}

/* ── Toggle switch ── */
.tog-wrap{position:relative;width:40px;height:22px;flex-shrink:0}
.tog-wrap input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2}
.tog-track{position:absolute;inset:0;border-radius:11px;transition:background .2s,border-color .2s;border:1px solid var(--border)}
.tog-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:left .2s,background .2s}

/* ── Buttons ── */
.btn-primary{background:var(--pink);color:#fff;border:none;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-mid);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.btn-outline:hover{border-color:var(--pink);color:var(--pink)}
.btn-danger{background:transparent;border:1px solid #fca5a5;color:#ef4444;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.btn-danger:hover{background:#fef2f2}
html.dark .btn-danger:hover{background:#450a0a}
.btn-edit{background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.btn-edit:hover{border-color:var(--pink);color:var(--pink)}

/* ── Page enter ── */
.page-enter{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<body>
<div id="root"></div>

<!-- Theme Toggle Button (rendered outside React for instant response) -->
<button class="theme-toggle" id="themeBtn" title="Toggle dark/light mode" aria-label="Toggle theme">🌙</button>

<script>
// Theme logic — runs before React
(function(){
  var saved = localStorage.getItem('yi-theme') || 'light';
  if(saved === 'dark') document.documentElement.classList.add('dark');
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeBtn').addEventListener('click', function(){
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('yi-theme', isDark ? 'dark' : 'light');
    this.textContent = isDark ? '☀️' : '🌙';
  });
})();
</script>

function isAuthIssue(error){
  const msg=(error?.message||"").toLowerCase();
  return error?.status===401||error?.status===403||msg.includes("row-level security")||msg.includes("permission")||msg.includes("not authorized")||msg.includes("jwt");
}
function getErrorMessage(error,fallback="Something went wrong."){
  if(!error)return fallback;
  if(isAuthIssue(error))return"Admin permission denied. Sign in with the approved admin account and confirm the Supabase admin policies are applied.";
  return error.message||fallback;
}
function getAdminSetupError(error){
  const msg=(error?.message||"").toLowerCase();
  if(msg.includes("admin_users")||msg.includes("does not exist"))return"Admin access could not be verified. Run the Supabase admin setup SQL first.";
  return getErrorMessage(error,"Admin access could not be verified. Please try again.");
}
async function checkAdminAccess(userId){
  const {data,error}=await db.from("admin_users").select("user_id").eq("user_id",userId).maybeSingle();
  if(error)throw error;
  return !!data;
}

/* ── Toast ── */
function useToast(){
  const [t,setT]=useState(null);
  const show=(msg,type="success")=>{setT({msg,type});setTimeout(()=>setT(null),3200)};
  return{toast:t,show};
}
function Toast({toast}){
  if(!toast)return null;
  const bg=toast.type==="error"?"#fef2f2":toast.type==="info"?"var(--bg-mid)":"var(--pink)";
  const tc=toast.type==="error"?"#b91c1c":toast.type==="info"?"var(--text-mid)":"#fff";
  const bc=toast.type==="error"?"#fecaca":toast.type==="info"?"var(--border)":"var(--pink-light)";
  return<div style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",zIndex:600,
    background:bg,color:tc,border:`1px solid ${bc}`,
    padding:"10px 22px",borderRadius:999,fontSize:13,fontFamily:"'DM Sans',sans-serif",
    fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,.12)",whiteSpace:"nowrap",
    animation:"fadeUp .3s ease both",display:"flex",alignItems:"center",gap:8}}>
    {toast.type==="error"?"✕":toast.type==="info"?"ℹ":"✓"} {toast.msg}
  </div>;
}

/* ── Spinner ── */
function Spinner({sm}){
  const s=sm?{width:15,height:15,borderWidth:2}:{width:38,height:38,borderWidth:2};
  return<div style={{...s,borderRadius:"50%",borderStyle:"solid",borderColor:"var(--border)",
    borderTopColor:"var(--pink)",animation:"spin .8s linear infinite",display:"inline-block"}}/>;
}

/* ── Toggle ── */
function Tog({checked,onChange,label}){
  return<label style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",userSelect:"none"}}>
    <div className="tog-wrap">
      <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>
      <div className="tog-track" style={{background:checked?"var(--pink)":"var(--bg-mid)",borderColor:checked?"var(--pink)":"var(--border)"}}/>
      <div className="tog-thumb" style={{left:checked?21:3,background:checked?"#fff":"var(--text-muted)"}}/>
    </div>
    {label&&<span style={{fontSize:13,color:"var(--text-mid)"}}>{label}</span>}
  </label>;
}

/* ── Header ── */
function Header({page,setPage}){

        {/* Desktop nav */}
        <nav style={{display:"flex",gap:32,alignItems:"center"}}>
          {nav.map(n=><button key={n.k} onClick={()=>setPage(n.k)}
            style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              fontSize:12,letterSpacing:".1em",textTransform:"uppercase",
              color:page===n.k?"var(--pink)":"var(--text-muted)",transition:"color .2s"}}>

              transition:"all .18s",textDecoration:"none"}}>
            <WaIcon/><span style={{display:"none"}} className="hidden sm:inline">WhatsApp</span>
          </a>
          {page==="admin"
            ?<button onClick={()=>setPage("home")} className="btn-outline" style={{borderRadius:999,padding:"6px 14px",fontSize:12,letterSpacing:".06em"}}>← Store</button>

/* ── Edit Modal ── */
function EditModal({product,cats,onClose,onSaved,show:toastFn}){
  const [form,setForm]=useState({name:product.name||"",description:product.description||"",price:product.price||"",category_id:product.category_id||"",occasion:product.occasion||"daily",is_new:product.is_new||false,is_featured:product.is_featured||false,is_sold_out:product.is_sold_out||false});
  const [saving,setSaving]=useState(false);
  const [preview,setPreview]=useState(product.image_url||"");
  const fileRef=useRef();
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const save=async()=>{
    if(!form.name.trim()){toastFn("Name is required","error");return;}
    if(!form.price||isNaN(form.price)){toastFn("Enter a valid price","error");return;}
    setSaving(true);
    let image_url=product.image_url;
    const file=fileRef.current?.files?.[0];
    if(file){
      const ext=file.name.split(".").pop();
      const {data,error}=await db.storage.from("product-images").upload(`product-${Date.now()}.${ext}`,file,{cacheControl:"3600",upsert:false});
      if(error){toastFn(getErrorMessage(error,"Upload failed"),"error");setSaving(false);return;}
      const {data:u}=db.storage.from("product-images").getPublicUrl(data.path);
      image_url=u.publicUrl;
    }
    const {error}=await db.from("products").update({name:form.name.trim(),description:form.description.trim()||null,price:parseFloat(form.price),category_id:form.category_id,occasion:form.occasion,is_new:form.is_new,is_featured:form.is_featured,is_sold_out:form.is_sold_out,image_url,updated_at:new Date().toISOString()}).eq("id",product.id);
    if(error){toastFn(getErrorMessage(error,"Update failed"),"error");}else{toastFn("Product updated!");onSaved();}
    setSaving(false);
  };

  const inp={background:"var(--bg-soft)",border:"1px solid var(--border)",color:"var(--text)",fontSize:13,padding:"10px 14px",fontFamily:"'DM Sans',sans-serif",width:"100%",borderRadius:6,transition:"border .2s"};

  return<div className="modal-ov" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal-box animate-fade-up" style={{borderRadius:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 22px",borderBottom:"1px solid var(--border)",position:"sticky",top:0,background:"var(--bg-card)",zIndex:10,borderRadius:"14px 14px 0 0"}}>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--text)"}}>Edit Product</span>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--text-muted)"}}>✕</button>
      </div>
      <div style={{padding:24,display:"flex",flexDirection:"column",gap:16}}>
        {/* Photo */}
        <div>
          <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Photo</label>
          <div style={{border:"2px dashed var(--border)",borderRadius:8,overflow:"hidden",position:"relative",minHeight:120,cursor:"pointer",background:"var(--bg-soft)",transition:"border-color .2s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="var(--pink)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <input type="file" accept="image/*" ref={fileRef} onChange={e=>{const f=e.target.files[0];if(f)setPreview(URL.createObjectURL(f))}} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",zIndex:2}}/>
            {preview?<div style={{position:"relative"}}>
              <img src={preview} alt="Preview" style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",opacity:0,transition:"opacity .2s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
                <span style={{color:"#fff",fontSize:13}}>Click to change</span>
              </div>
            </div>
            :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
              <span style={{fontSize:28,marginBottom:8}}>📷</span>
              <span style={{fontSize:12,color:"var(--text-muted)"}}>Click to upload photo</span>
            </div>}
          </div>
        </div>
        {/* Name */}
        <div>
          <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Name *</label>
          <input className="fi" type="text" value={form.name} onChange={e=>f("name",e.target.value)} style={inp}/>
        </div>
        {/* Description */}
        <div>
          <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Description</label>
          <textarea className="fi" rows={2} value={form.description} onChange={e=>f("description",e.target.value)} style={{...inp,resize:"none"}}/>
        </div>
        {/* Price + Cat */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Price (₹) *</label>
            <input className="fi" type="number" value={form.price} onChange={e=>f("price",e.target.value)} style={inp}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Category</label>
            <select className="fi" value={form.category_id} onChange={e=>f("category_id",e.target.value)} style={inp}>
              {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
        </div>
        {/* Occasion */}
        <div>
          <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Occasion</label>
          <select className="fi" value={form.occasion} onChange={e=>f("occasion",e.target.value)} style={inp}>
            <option value="daily">Daily Wear</option>
            <option value="festive">Festive</option>
            <option value="wedding">Wedding / Bridal</option>
          </select>
        </div>
        {/* Toggles */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,paddingTop:4}}>
          <Tog checked={form.is_new} onChange={v=>f("is_new",v)} label="New Arrival"/>
          <Tog checked={form.is_featured} onChange={v=>f("is_featured",v)} label="Featured"/>
          <Tog checked={form.is_sold_out} onChange={v=>f("is_sold_out",v)} label="Sold Out"/>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,padding:"14px 22px",borderTop:"1px solid var(--border)"}}>
        <button onClick={onClose} className="btn-outline" style={{padding:"9px 20px",fontSize:12,letterSpacing:".06em",borderRadius:6}}>Cancel</button>
        <button onClick={save} disabled={saving} className="btn-primary" style={{padding:"9px 24px",fontSize:12,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",borderRadius:6,display:"flex",alignItems:"center",gap:8,opacity:saving?.6:1}}>
          {saving&&<Spinner sm/>}{saving?"Saving…":"Save Changes"}
        </button>
      </div>
    </div>
  </div>;
}

/* ── Admin Login ── */
function AdminLogin({session,authError,onLogout}){
  const [email,setEmail]=useState(()=>session?.user?.email||localStorage.getItem(SAVED_ADMIN_EMAIL_KEY)||"");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [vis,setVis]=useState(false);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(session?.user?.email)setEmail(session.user.email);},[session?.user?.email]);
  useEffect(()=>{setErr(authError||"");},[authError]);
  const emailInp={background:"var(--bg-soft)",border:"1px solid var(--border)",color:"var(--text)",fontSize:14,padding:"12px 14px",fontFamily:"'DM Sans',sans-serif",width:"100%",borderRadius:8,transition:"border .2s"};
  const pwInp={...emailInp,padding:"12px 44px 12px 14px"};
  const login=async()=>{
    const cleanEmail=email.trim().toLowerCase();
    if(!cleanEmail||!pw){setErr("Enter your admin email and password.");return;}
    setSaving(true);setErr("");
    const {error}=await db.auth.signInWithPassword({email:cleanEmail,password:pw});
    if(error){setErr(getErrorMessage(error,"Sign in failed."));setPw("");setSaving(false);return;}
    localStorage.setItem(SAVED_ADMIN_EMAIL_KEY,cleanEmail);
    setPw("");
    setSaving(false);
  };
  return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:380,animation:"fadeUp .45s ease both"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:32}}>
        <img src={LOGO} alt="Logo" style={{width:72,height:72,objectFit:"contain",marginBottom:16}}/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"var(--text)",marginBottom:4}}>Admin Access</h1>
        <p style={{fontSize:13,color:"var(--text-muted)",fontFamily:"'DM Sans',sans-serif"}}>Yashvi Imitation — Staff Only</p>
      </div>
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:16,padding:32,boxShadow:"var(--shadow)"}}>
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#b91c1c",fontSize:13,padding:"10px 14px",borderRadius:6,marginBottom:16,fontFamily:"'DM Sans',sans-serif"}}>{err}</div>}
        {session
          ?<>
            <p style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.6,fontFamily:"'DM Sans',sans-serif",marginBottom:18}}>
              Signed in as <span style={{color:"var(--text)"}}>{session.user.email||"an authenticated user"}</span>, but this account is not approved for admin access.
            </p>
            <button onClick={onLogout} className="btn-outline" style={{width:"100%",padding:13,fontSize:13,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",borderRadius:8}}>
              Sign Out
            </button>
          </>
          :<>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Admin Email</label>
            <input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="owner@example.com" style={{...emailInp,marginBottom:16}}/>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Password</label>
            <div style={{position:"relative",marginBottom:20}}>
              <input className="fi" type={vis?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter admin password" style={pwInp}/>
              <button onClick={()=>setVis(v=>!v)} type="button" style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"var(--text-muted)"}}>{vis?"🙈":"👁"}</button>
            </div>
            <button onClick={login} disabled={saving} className="btn-primary" style={{width:"100%",padding:13,fontSize:13,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:saving?.6:1}}>
              {saving&&<Spinner sm/>}{saving?"Signing In…":"Enter Admin Panel"}
            </button>
          </>
        }
      </div>
    </div>
  </div>;
}

/* ── Admin Panel ── */
function AdminPanel({onLogout,adminEmail}){
  const [tab,setTab]=useState("products");
  const [products,setProducts]=useState([]);
  const [cats,setCats]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState("");
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);
  const [editItem,setEditItem]=useState(null);
  const [preview,setPreview]=useState("");
  const [catSaving,setCatSaving]=useState(false);
  const [catDeleting,setCatDeleting]=useState(null);
  const [catForm,setCatForm]=useState({name:"",slug:""});
  const fileRef=useRef();
  const {toast,show}=useToast();
  const [form,setForm]=useState({name:"",description:"",price:"",category_id:"",occasion:"daily",is_new:true,is_featured:false,is_sold_out:false});
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const load=useCallback(async()=>{
    setLoading(true);setLoadError("");
    const [{data:c,error:catError},{data:p,error:prodError}]=await Promise.all([
      db.from("categories").select(CATEGORY_SELECT).order("name"),
      db.from("products").select(PRODUCT_SELECT).order("created_at",{ascending:false}),
    ]);
    const loadFailure=catError||prodError;
    if(loadFailure){
      setCats([]);setProducts([]);setLoadError(getErrorMessage(loadFailure,"Admin data could not be loaded."));setLoading(false);return;
    }
    setCats(c||[]);setProducts(p||[]);
    if(c?.length&&!form.category_id)setForm(prev=>({...prev,category_id:c[0].id}));
    setLoading(false);
  },[form.category_id]);
  useEffect(()=>{load();},[load]);

  const reset=()=>{setForm(p=>({...p,name:"",description:"",price:"",is_new:true,is_featured:false,is_sold_out:false}));setPreview("");if(fileRef.current)fileRef.current.value="";};

  const submit=async()=>{
    if(!form.name.trim()){show("Name is required","error");return;}
    if(!form.price||isNaN(form.price)){show("Enter a valid price","error");return;}
    if(!form.category_id){show("Select a category","error");return;}
    setSaving(true);
    let image_url=null;
    const file=fileRef.current?.files?.[0];
    if(file){
      const ext=file.name.split(".").pop();
      const {data,error}=await db.storage.from("product-images").upload(`product-${Date.now()}.${ext}`,file,{cacheControl:"3600",upsert:false});
      if(error){show(getErrorMessage(error,"Upload failed"),"error");setSaving(false);return;}
      const {data:u}=db.storage.from("product-images").getPublicUrl(data.path);
      image_url=u.publicUrl;
    }
    const {error}=await db.from("products").insert({name:form.name.trim(),description:form.description.trim()||null,price:parseFloat(form.price),category_id:form.category_id,occasion:form.occasion,is_new:form.is_new,is_featured:form.is_featured,is_sold_out:form.is_sold_out,image_url});
    if(error){show(getErrorMessage(error,"Product add failed"),"error");}else{show("Product added!");reset();}
    setSaving(false);load();
  };

  const del=async(id,name)=>{
    if(!window.confirm(`Remove "${name}"?`))return;
    setDeleting(id);
    const {error}=await db.from("products").delete().eq("id",id);
    if(error){show(getErrorMessage(error,"Remove failed"),"error");}else{show("Removed","info");load();}
    setDeleting(null);
  };

  const addCat=async()=>{
    if(!catForm.name.trim()){show("Name required","error");return;}
    setCatSaving(true);
    const {error}=await db.from("categories").insert({name:catForm.name.trim(),slug:catForm.slug||catForm.name.toLowerCase().replace(/\s+/g,"-")});
    if(error){show(getErrorMessage(error,"Category add failed"),"error");}else{show("Category added!");setCatForm({name:"",slug:""});}
    setCatSaving(false);load();
  };

  const delCat=async(id,name)=>{
    const cnt=products.filter(p=>p.category_id===id).length;
    if(!window.confirm(cnt>0?`Delete "${name}"? This will unlink ${cnt} product(s).`:`Delete "${name}"?`))return;
    setCatDeleting(id);
    const {error}=await db.from("categories").delete().eq("id",id);
    if(error){show(getErrorMessage(error,"Category delete failed"),"error");}else{show("Category removed","info");load();}
    setCatDeleting(null);
  };

  const stats=[
    {n:products.length,l:"Total"},
    {n:products.filter(p=>p.is_new).length,l:"New"},
    {n:products.filter(p=>p.is_featured).length,l:"Featured"},
    {n:products.filter(p=>!p.is_sold_out).length,l:"Available"},
  ];

  const inp={background:"var(--bg-soft)",border:"1px solid var(--border)",color:"var(--text)",fontSize:13,padding:"10px 14px",fontFamily:"'DM Sans',sans-serif",width:"100%",borderRadius:8,transition:"border .2s"};
  const TABS=[{k:"products",l:"Products"},{k:"add",l:"Add Product"},{k:"categories",l:"Categories"}];

  return<div style={{minHeight:"100vh",background:"var(--bg)",paddingTop:68,paddingBottom:60}}>
    <Toast toast={toast}/>
    {editItem&&<EditModal product={editItem} cats={cats} onClose={()=>setEditItem(null)} onSaved={()=>{setEditItem(null);load();}} show={show}/>}
    <div style={{maxWidth:1100,margin:"0 auto",padding:"0 1.5rem"}}>
      {/* Header */}
      <div style={{padding:"36px 0 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:28}}>
        <div>
          <p style={{fontSize:11,letterSpacing:".22em",color:"var(--pink)",textTransform:"uppercase",marginBottom:4,fontFamily:"'DM Sans',sans-serif"}}>✦ Management</p>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:38,fontWeight:600,color:"var(--text)"}}>Admin Panel</h1>
          {adminEmail&&<p style={{fontSize:12,color:"var(--text-muted)",marginTop:6,fontFamily:"'DM Sans',sans-serif"}}>Signed in as {adminEmail}</p>}
        </div>
        <button onClick={onLogout} className="btn-outline" style={{padding:"9px 18px",fontSize:12,letterSpacing:".06em",borderRadius:8}}>🔒 Lock Panel</button>
      </div>
      {loadError&&<div style={{background:"#fff7ed",border:"1px solid #fdba74",color:"#9a3412",fontSize:13,padding:"12px 14px",borderRadius:10,marginBottom:20,fontFamily:"'DM Sans',sans-serif"}}>{loadError}</div>}

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
        {stats.map(s=><div key={s.l} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:"18px 20px",boxShadow:"var(--shadow-card)"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:400,color:"var(--pink)",lineHeight:1}}>{s.n}</div>
          <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".1em",textTransform:"uppercase",marginTop:5,fontFamily:"'DM Sans',sans-serif"}}>{s.l}</div>
        </div>)}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:28}}>
        {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)}
          className={tab===t.k?"tab-a":"tab-i"}
          style={{padding:"10px 20px",fontSize:12,letterSpacing:".08em",textTransform:"uppercase",background:"none",border:"none",borderBottom:"2px solid",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"color .18s"}}>
          {t.l}
        </button>)}
      </div>

      {/* ── Tab: Add ── */}
      {tab==="add"&&<div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,padding:28,boxShadow:"var(--shadow-card)"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--text)",marginBottom:20,paddingBottom:16,borderBottom:"1px solid var(--border-soft)"}}>✦ Add New Product</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Product Photo</label>
            <div style={{border:"2px dashed var(--border)",borderRadius:8,overflow:"hidden",position:"relative",minHeight:140,cursor:"pointer",background:"var(--bg-soft)",transition:"border-color .2s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--pink)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              <input type="file" accept="image/*" ref={fileRef} onChange={e=>{const f=e.target.files[0];if(f)setPreview(URL.createObjectURL(f))}} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",zIndex:2}}/>
              {preview?<img src={preview} alt="Preview" style={{width:"100%",maxHeight:220,objectFit:"cover",display:"block"}}/>
                :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:36}}>
                  <span style={{fontSize:36,marginBottom:10}}>📷</span>
                  <p style={{fontSize:13,color:"var(--text-muted)",fontFamily:"'DM Sans',sans-serif"}}><span style={{color:"var(--pink)"}}>Click to upload</span> or drag & drop</p>
                  <p style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>JPG, PNG, WebP up to 10MB</p>
                </div>}
            </div>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Product Name *</label>
            <input className="fi" type="text" value={form.name} onChange={e=>f("name",e.target.value)} placeholder="e.g. Kundan Long Necklace Set" style={inp}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Description</label>
            <textarea className="fi" rows={3} value={form.description} onChange={e=>f("description",e.target.value)} placeholder="Material, design, occasion…" style={{...inp,resize:"none"}}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Price (₹) *</label>
            <input className="fi" type="number" value={form.price} onChange={e=>f("price",e.target.value)} placeholder="450" style={inp}/>
          </div>
          <div>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Category *</label>
            <select className="fi" value={form.category_id} onChange={e=>f("category_id",e.target.value)} style={inp}>
              <option value="">Select…</option>
              {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Occasion</label>
            <select className="fi" value={form.occasion} onChange={e=>f("occasion",e.target.value)} style={inp}>
              <option value="daily">Daily Wear</option><option value="festive">Festive</option><option value="wedding">Wedding / Bridal</option>
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14,justifyContent:"center"}}>
            <Tog checked={form.is_new} onChange={v=>f("is_new",v)} label="New Arrival"/>
            <Tog checked={form.is_featured} onChange={v=>f("is_featured",v)} label="Featured on Homepage"/>
            <Tog checked={form.is_sold_out} onChange={v=>f("is_sold_out",v)} label="Mark as Sold Out"/>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:24,paddingTop:20,borderTop:"1px solid var(--border-soft)"}}>
          <button onClick={reset} className="btn-outline" style={{padding:"9px 20px",fontSize:12,letterSpacing:".06em",borderRadius:8}}>Reset</button>
          <button onClick={submit} disabled={saving} className="btn-primary" style={{padding:"9px 26px",fontSize:12,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",borderRadius:8,display:"flex",alignItems:"center",gap:8,opacity:saving?.6:1}}>
            {saving&&<Spinner sm/>}{saving?"Adding…":"+ Add Product"}
          </button>
        </div>
      </div>}

      {/* ── Tab: Products ── */}
      {tab==="products"&&<div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
        <div style={{padding:"14px 22px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--text)"}}>All Products</span>
          <span style={{fontSize:11,color:"var(--text-muted)",letterSpacing:".1em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>{products.length} items</span>
        </div>
        {loading?<div style={{display:"flex",justifyContent:"center",padding:60}}><Spinner/></div>
          :products.length===0?<div style={{textAlign:"center",padding:60}}>
            <div style={{fontSize:44,marginBottom:10}}>📦</div>
            <p style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--text)",marginBottom:8}}>No products yet</p>
            <button onClick={()=>setTab("add")} style={{fontSize:13,color:"var(--pink)",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Add your first product →</button>
          </div>
          :<div>{products.map(p=>{
            const slug=p.categories?.slug||"default";
            return<div key={p.id} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 22px",borderBottom:"1px solid var(--border-soft)",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--bg-soft)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:52,height:52,flexShrink:0,borderRadius:8,overflow:"hidden",background:"var(--bg-mid)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                {p.image_url?<img src={p.image_url} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:CAT_ICONS[slug]||"💎"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontFamily:"'DM Sans',sans-serif"}}>{p.name}</div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{p.categories?.name}{p.is_new?" · 🆕":""}{p.is_featured?" · ⭐":""}{p.is_sold_out?" · 🔴 Sold":""}</div>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"var(--text-mid)",whiteSpace:"nowrap"}}>₹{Number(p.price).toLocaleString("en-IN")}</div>
              <span style={{fontSize:10,letterSpacing:".08em",textTransform:"uppercase",padding:"3px 10px",borderRadius:4,fontFamily:"'DM Sans',sans-serif",background:p.is_sold_out?"#fef2f2":"#f0fdf4",color:p.is_sold_out?"#b91c1c":"#15803d",border:`1px solid ${p.is_sold_out?"#fecaca":"#bbf7d0"}`}}>
                {p.is_sold_out?"Sold":"Avail."}
              </span>
              <button onClick={()=>setEditItem(p)} className="btn-edit" style={{padding:"6px 14px",fontSize:11,letterSpacing:".04em",borderRadius:6,whiteSpace:"nowrap"}}>✏ Edit</button>
              <button onClick={()=>del(p.id,p.name)} disabled={deleting===p.id} className="btn-danger" style={{padding:"6px 12px",fontSize:11,borderRadius:6,whiteSpace:"nowrap",opacity:deleting===p.id?.5:1}}>
                {deleting===p.id?<Spinner sm/>:"🗑"}
              </button>
            </div>;
          })}</div>
        }
      </div>}

      {/* ── Tab: Categories ── */}
      {tab==="categories"&&<div style={{display:"flex",flexDirection:"column",gap:20}}>
        {/* Add */}
        <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,padding:28,boxShadow:"var(--shadow-card)"}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--text)",marginBottom:20,paddingBottom:16,borderBottom:"1px solid var(--border-soft)"}}>✦ Add New Category</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>
            <div>
              <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Category Name *</label>
              <input className="fi" type="text" value={catForm.name} placeholder="e.g. Maang Tikka"
                onChange={e=>{const n=e.target.value;setCatForm({name:n,slug:n.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")});}}
                style={inp}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:10,letterSpacing:".12em",color:"var(--text-muted)",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Slug (auto)</label>
              <input className="fi" type="text" value={catForm.slug} onChange={e=>setCatForm(f=>({...f,slug:e.target.value}))} placeholder="maang-tikka" style={inp}/>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button onClick={addCat} disabled={catSaving} className="btn-primary" style={{padding:"9px 26px",fontSize:12,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",borderRadius:8,display:"flex",alignItems:"center",gap:8,opacity:catSaving?.6:1}}>
              {catSaving&&<Spinner sm/>}{catSaving?"Adding…":"+ Add Category"}
            </button>
          </div>
        </div>
        {/* List */}
        <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
          <div style={{padding:"14px 22px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--text)"}}>All Categories</span>
            <span style={{fontSize:11,color:"var(--text-muted)",letterSpacing:".1em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>{cats.length} categories</span>
          </div>
          {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><Spinner/></div>
            :cats.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-muted)",fontFamily:"'DM Sans',sans-serif",fontSize:13}}>No categories yet.</div>
            :<div>{cats.map(c=>{
              const cnt=products.filter(p=>p.category_id===c.id).length;
              return<div key={c.id} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 22px",borderBottom:"1px solid var(--border-soft)",transition:"background .15s"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--bg-soft)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:24}}>{CAT_ICONS[c.slug]||"💎"}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:500,color:"var(--text)",fontFamily:"'DM Sans',sans-serif"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>/{c.slug} · {cnt} product{cnt!==1?"s":""}</div>
                </div>
                <button onClick={()=>delCat(c.id,c.name)} disabled={catDeleting===c.id} className="btn-danger" style={{padding:"6px 14px",fontSize:11,borderRadius:6,opacity:catDeleting===c.id?.5:1}}>
                  {catDeleting===c.id?<Spinner sm/>:"🗑 Delete"}
                </button>
              </div>;
            })}</div>
          }
        </div>
      </div>}
    </div>
  </div>;
}

/* ── App ── */
function App(){
  const [page,setPage]=useState("home");
  const [session,setSession]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [authError,setAuthError]=useState("");
  const go=p=>{window.scrollTo({top:0,behavior:"smooth"});setPage(p);};
  useEffect(()=>{
    let active=true;
    const syncSession=async(nextSession)=>{
      if(!active)return;
      setAuthReady(false);setSession(nextSession);setAuthError("");
      if(!nextSession?.user){setIsAdmin(false);setAuthReady(true);return;}
      try{
        const allowed=await checkAdminAccess(nextSession.user.id);
        if(!active)return;
        setIsAdmin(allowed);
        setAuthError(allowed?"":"This account is not approved for admin access.");
      }catch(error){
        if(!active)return;
        setIsAdmin(false);
        setAuthError(getAdminSetupError(error));
      }
      if(active)setAuthReady(true);
    };
    db.auth.getSession().then(({data:{session:nextSession}})=>syncSession(nextSession));
    const {data:{subscription}}=db.auth.onAuthStateChange((_event,nextSession)=>{syncSession(nextSession);});
    return()=>{active=false;subscription.unsubscribe();};
  },[]);
  const logout=async()=>{
    const {error}=await db.auth.signOut();
    if(error){window.alert(getErrorMessage(error,"Sign out failed."));return;}
    go("home");
  };
  if(page==="admin"){
    if(!authReady)return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;
    if(!session||!isAdmin)return<AdminLogin session={session} authError={authError} onLogout={logout}/>;
    return<><Header page={page} setPage={go}/><AdminPanel adminEmail={session.user.email} onLogout={logout}/><Footer/></>;
  }
  return<><Header page={page} setPage={go}/><main style={{animation:"fadeUp .35s ease both"}}>{page==="home"&&<HomePage setPage={go}/>}{(page==="collection"||page==="occasions")&&<CollectionPage/>}</main><Footer/></>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
